name: Build Python APK (No Deprecated Actions)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4     # ✅ latest non‑deprecated

      - name: Cache Buildozer global files
        uses: actions/cache@v4        # ✅ latest
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build APK using Buildozer Docker image
        uses: docker://kivy/buildozer:latest
        with:
          args: |
            bash -c "
              if [ ! -f buildozer.spec ]; then
                buildozer init
              fi
              buildozer android debug
            "

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4   # ✅ v4 – no deprecation
        with:
          name: python-app-debug
          path: bin/*.apk
          if-no-files-found: error
